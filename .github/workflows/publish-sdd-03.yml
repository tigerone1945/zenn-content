name: Publish SDD Article 03 at 8AM JST

on:
  schedule:
    - cron: '0 23 6 7 *'  # 2026-07-07 08:00 JST (UTC+9)
  workflow_dispatch:         # 手動テスト用

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish article
        run: |
          ARTICLE="articles/sdd-03-what-is-spec-driven-development.md"
          if grep -q 'published: false' "$ARTICLE"; then
            sed -i 's/published: false/published: true/' "$ARTICLE"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$ARTICLE"
            git commit -m "publish: SDD第3回 仕様駆動開発（SDD）とは何か記事を公開"
            git push
          else
            echo "Already published, skipping."
          fi
