name: Publish SDD Hub Article at 8AM JST

on:
  schedule:
    - cron: '0 23 25 6 *'  # 2026-06-26 08:00 JST (UTC+9)
  workflow_dispatch:         # 手動テスト用

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish article
        run: |
          ARTICLE="articles/sdd-hub-ai-sdd-series.md"
          if grep -q 'published: false' "$ARTICLE"; then
            sed -i 's/published: false/published: true/' "$ARTICLE"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "$ARTICLE"
            git commit -m "publish: SDDハブ記事を公開"
            git push
          else
            echo "Already published, skipping."
          fi
